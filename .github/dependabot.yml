version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  # Maintain SwiftPM dependencies declared in the Xcode project.
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain SwiftPM dependencies declared by local packages.
  - package-ecosystem: "swift"
    directory: "/AppleAPI"
    schedule:
      interval: "weekly"

  - package-ecosystem: "swift"
    directory: "/XcodesKit"
    schedule:
      interval: "weekly"

  # Maintain the AppCast Jekyll toolchain.
  - package-ecosystem: "bundler"
    directory: "/AppCast"
    schedule:
      interval: "weekly"
