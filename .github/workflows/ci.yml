name: CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "AppleAPI/**"
      - "Sources/**"
      - "Tests/**"
      - "Rhodon.xcodeproj/**"
      - "RhodonKit/**"
      - "project.yml"
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "AppleAPI/**"
      - "Sources/**"
      - "Tests/**"
      - "Rhodon.xcodeproj/**"
      - "RhodonKit/**"
      - "project.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  DERIVED_DATA_PATH: .xcode-derived-data
  SOURCE_PACKAGES_PATH: .xcode-source-packages
  XCODE_PROJECT: Rhodon.xcodeproj
  XCODE_SCHEME: Rhodon
  CODE_SIGNING_ALLOWED: NO
  CODE_SIGNING_REQUIRED: NO
  CODE_SIGN_IDENTITY: ""

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26
    timeout-minutes: 20
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: Xcode version
      id: xcode-version
      run: |
        set -euo pipefail
        xcodebuild -version
        xcode-select -p
        cache_version="$(xcodebuild -version | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
        echo "xcode-cache-version=$cache_version" >> "$GITHUB_OUTPUT"

    - name: Restore SwiftPM cache
      uses: actions/cache@v5
      with:
        path: ${{ env.SOURCE_PACKAGES_PATH }}
        key: swiftpm-${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-version.outputs.xcode-cache-version }}-${{ hashFiles('Rhodon.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
        restore-keys: |
          swiftpm-${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-version.outputs.xcode-cache-version }}-

    - name: Restore Xcode build cache
      uses: actions/cache@v5
      with:
        path: |
          ${{ env.DERIVED_DATA_PATH }}/Build
          ${{ env.DERIVED_DATA_PATH }}/ModuleCache.noindex
          ${{ env.DERIVED_DATA_PATH }}/SDKStatCaches.noindex
        key: xcodebuild-${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-version.outputs.xcode-cache-version }}-${{ hashFiles('Rhodon.xcodeproj/project.pbxproj', 'Rhodon.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'Rhodon.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Sources/**/*.swift', 'Sources/Rhodon/Resources/**', 'Tests/**/*.swift', 'AppleAPI/**/*.swift', 'RhodonKit/**/*.swift', 'project.yml') }}
        restore-keys: |
          xcodebuild-${{ runner.os }}-${{ runner.arch }}-xcode-${{ steps.xcode-version.outputs.xcode-cache-version }}-

    - name: Build and test
      run: |
        set -euo pipefail
        destination="platform=macOS,arch=$(uname -m)"
        xcodebuild test \
          -project "${XCODE_PROJECT}" \
          -scheme "${XCODE_SCHEME}" \
          -destination "${destination}" \
          -derivedDataPath "${DERIVED_DATA_PATH}" \
          -clonedSourcePackagesDirPath "${SOURCE_PACKAGES_PATH}" \
          -onlyUsePackageVersionsFromResolvedFile \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          COMPILER_INDEX_STORE_ENABLE=NO \
          | xcbeautify --renderer github-actions
