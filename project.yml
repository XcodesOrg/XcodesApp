name: Xcodes

options:
  createIntermediateGroups: false
  defaultConfig: Release
  defaultSourceDirectoryType: syncedFolder
  deploymentTarget:
    macOS: "15.0"
  developmentLanguage: en
  projectFormat: xcode16_3
  settingPresets: none
  xcodeVersion: "16.3"

configs:
  Debug: debug
  Test: debug
  Release: release

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ANALYZER_LOCALIZABILITY_NONLOCALIZED: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++14
    CLANG_CXX_LIBRARY: libc++
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    CODE_SIGNING_SUBJECT_ORGANIZATIONAL_UNIT: ZU6GR6B2FY
    COPY_PHASE_STRIP: NO
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_C_LANGUAGE_STANDARD: gnu11
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    MTL_FAST_MATH: YES
    SDKROOT: macosx
    SWIFT_EMIT_LOC_STRINGS: YES
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_DYNAMIC_NO_PIC: NO
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS:
        - DEBUG=1
        - $(inherited)
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Test:
      DEBUG_INFORMATION_FORMAT: dwarf
      ENABLE_TESTABILITY: YES
      GCC_DYNAMIC_NO_PIC: NO
      GCC_OPTIMIZATION_LEVEL: 0
      GCC_PREPROCESSOR_DEFINITIONS:
        - DEBUG=1
        - $(inherited)
      MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
      ONLY_ACTIVE_ARCH: YES
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: -Onone
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
      ENABLE_NS_ASSERTIONS: NO
      MTL_ENABLE_DEBUG_INFO: NO
      SWIFT_COMPILATION_MODE: wholemodule
      SWIFT_OPTIMIZATION_LEVEL: -O

packages:
  AppleAPI:
    path: AppleAPI
    group: ""
  XcodesKit:
    path: XcodesKit
    group: ""
  Version:
    url: https://github.com/mxcl/Version
    from: 2.2.1
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: 2.9.6
  DockProgress:
    url: https://github.com/sindresorhus/DockProgress
    from: 5.1.0
  Path:
    url: https://github.com/mxcl/Path.swift
    from: 1.6.0
  swift-collections:
    url: https://github.com/apple/swift-collections.git
    from: 1.5.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
  swift-srp:
    url: https://github.com/adam-fowler/swift-srp
    from: 2.3.0
  big-num:
    url: https://github.com/adam-fowler/big-num
    from: 2.0.3

targets:
  Xcodes:
    type: application
    platform: macOS
    sources:
      - path: Sources/Xcodes
        type: syncedFolder
        excludes:
          - Resources/aria2c
          - Resources/unxip
          - Resources/Info.plist
          - Resources/Xcodes.entitlements
          - Resources/XcodesTest.entitlements
      - path: Sources/HelperXPCShared
        type: syncedFolder
    dependencies:
      - target: eu.mpwg.xcodes.Helper
        embed: true
        link: false
        codeSign: true
        removeHeaders: false
        copy:
          destination: wrapper
          subpath: Contents/Library/LaunchServices
      - sdk: CryptoKit.framework
      - package: AppleAPI
      - package: Version
      - package: SwiftSoup
      - package: DockProgress
      - package: XcodesKit
      - package: Path
      - package: swift-collections
        product: OrderedCollections
      - package: Sparkle
      - package: swift-srp
        product: SRP
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: XcodesIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: NO
        COMBINE_HIDPI_IMAGES: YES
        CURRENT_PROJECT_VERSION: 34
        DEVELOPMENT_ASSET_PATHS: "\"Sources/Xcodes/Preview Content\""
        ENABLE_PREVIEWS: YES
        INFOPLIST_FILE: Sources/Xcodes/Resources/Info.plist
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        MARKETING_VERSION: 3.0.2
        PRODUCT_BUNDLE_IDENTIFIER: eu.mpwg.xcodes
        PRODUCT_NAME: Xcodes
        SWIFT_VERSION: "5.0"
      configs:
        Debug:
          CODE_SIGN_IDENTITY[sdk=macosx*]: Apple Development
          CODE_SIGN_ENTITLEMENTS: Sources/Xcodes/Resources/Xcodes.entitlements
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: PZV43D6HWT
          ENABLE_HARDENED_RUNTIME: YES
        Test:
          CODE_SIGN_ENTITLEMENTS: Sources/Xcodes/Resources/XcodesTest.entitlements
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: ""
          ENABLE_HARDENED_RUNTIME: NO
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_IDENTITY[sdk=macosx*]: Apple Development
          CODE_SIGN_ENTITLEMENTS: Sources/Xcodes/Resources/Xcodes.entitlements
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: PZV43D6HWT
          ENABLE_HARDENED_RUNTIME: YES
    postCompileScripts:
      - name: Copy command-line tools
        basedOnDependencyAnalysis: true
        inputFiles:
          - $(SRCROOT)/Sources/Xcodes/Resources/aria2c
          - $(SRCROOT)/Sources/Xcodes/Resources/unxip
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/aria2c
          - $(TARGET_BUILD_DIR)/$(EXECUTABLE_FOLDER_PATH)/unxip
        script: |
          set -euo pipefail

          destination="$TARGET_BUILD_DIR/$EXECUTABLE_FOLDER_PATH"
          mkdir -p "$destination"

          for tool in aria2c unxip; do
            source="$SRCROOT/Sources/Xcodes/Resources/$tool"
            target="$destination/$tool"

            rm -f "$target"
            cp "$source" "$target"
            chmod 755 "$target"

            if [[ "${CODE_SIGNING_ALLOWED:-YES}" != "NO" && -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" && "${EXPANDED_CODE_SIGN_IDENTITY}" != "-" ]]; then
              /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" "$target"
            fi
          done

  XcodesTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/XcodesTests
        type: syncedFolder
    dependencies:
      - target: Xcodes
    settings:
      base:
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: YES
        BUNDLE_LOADER: $(TEST_HOST)
        COMBINE_HIDPI_IMAGES: YES
        INFOPLIST_FILE: Tests/XcodesTests/Info.plist
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
          - "@loader_path/../Frameworks"
        PRODUCT_BUNDLE_IDENTIFIER: eu.mpwg.xcodes.tests
        PRODUCT_NAME: $(TARGET_NAME)
        SWIFT_VERSION: "5.0"
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Xcodes.app/Contents/MacOS/Xcodes
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: PZV43D6HWT
        Test:
          CODE_SIGN_IDENTITY: "-"
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_IDENTITY[sdk=macosx*]: "-"
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: ZU6GR6B2FY
          PRODUCT_BUNDLE_IDENTIFIER: eu.mpwg.xcodes.tests

  eu.mpwg.xcodes.Helper:
    type: tool
    platform: macOS
    sources:
      - path: Sources/HelperXPCShared
        type: syncedFolder
      - path: Sources/PrivilegedHelper
        type: syncedFolder
        excludes:
          - AuditTokenHack.h
          - Info.plist
          - launchd.plist
          - PrivilegedHelper-Bridging-Header.h
          - PrivilegedHelperTest.entitlements
          - SimpleXPCApp.LICENSE
    settings:
      base:
        CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        INFOPLIST_FILE: Sources/PrivilegedHelper/Info.plist
        MARKETING_VERSION: 2.0.0
        OTHER_LDFLAGS:
          - -sectcreate
          - __TEXT
          - __launchd_plist
          - $(SRCROOT)/Sources/PrivilegedHelper/launchd.plist
        PRODUCT_BUNDLE_IDENTIFIER: eu.mpwg.xcodes.Helper
        PRODUCT_NAME: $(TARGET_NAME)
        SKIP_INSTALL: YES
        SWIFT_OBJC_BRIDGING_HEADER: Sources/PrivilegedHelper/PrivilegedHelper-Bridging-Header.h
        SWIFT_VERSION: "5.0"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: PZV43D6HWT
          ENABLE_HARDENED_RUNTIME: YES
        Test:
          CODE_SIGN_ENTITLEMENTS: Sources/PrivilegedHelper/PrivilegedHelperTest.entitlements
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: ""
          ENABLE_HARDENED_RUNTIME: NO
          PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_IDENTITY[sdk=macosx*]: Apple Development
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: PZV43D6HWT
          ENABLE_HARDENED_RUNTIME: YES

schemes:
  Xcodes:
    build:
      targets:
        Xcodes: all
      parallelizeBuild: true
      buildImplicitDependencies: true
    run:
      config: Debug
      executable: Xcodes
      language: en
    test:
      config: Test
      targets:
        - XcodesTests
    profile:
      config: Release
      executable: Xcodes
    analyze:
      config: Debug
    archive:
      config: Release
      revealArchiveInOrganizer: true
      postActions:
        - name: Run Script
          settingsTarget: Xcodes
          script: |
            # https://forums.swift.org/t/swift-package-binary-framework-issue/41922/3
            # Remove overzealous copying of Sparkle.framework
            set -x

            rm -rf "$ARCHIVE_PRODUCTS_PATH/Applications/$EXECUTABLE_FOLDER_PATH/Sparkle.framework"
            rm -rf "$ARCHIVE_PRODUCTS_PATH/Applications/$CONTENTS_FOLDER_PATH/Library/LaunchServices/Sparkle.framework"

  eu.mpwg.xcodes.Helper:
    build:
      targets:
        eu.mpwg.xcodes.Helper: all
      parallelizeBuild: true
      buildImplicitDependencies: true
    run:
      config: Debug
      executable: eu.mpwg.xcodes.Helper
    test:
      config: Debug
    profile:
      config: Release
      executable: eu.mpwg.xcodes.Helper
    analyze:
      config: Debug
    archive:
      config: Release
      revealArchiveInOrganizer: true
